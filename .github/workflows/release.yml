name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Rename bundles (strip version from filename)
        id: rename
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          # tr -d '\r' — Git Bash on Windows appends CR to each line of jq output,
          #   which breaks `cp "$f"` with a "no such file" error on the phantom \r suffix.
          # [ -d "$f" ] — tauri-action emits the .app bundle directory alongside each .dmg;
          #   only file bundles (.msi, .exe, .dmg) should make it to the draft release.
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | tr -d '\r' | while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -d "$f" ] && continue
            base=$(basename "$f")
            newbase=${base//_${VERSION}_/_}
            cp "$f" "release-assets/$newbase"
            echo "  $base -> $newbase"
          done
          ls -la release-assets/

      - name: Publish to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Flint ${{ github.ref_name }}"
          body: "See CHANGELOG.md for release notes."
          draft: true
          prerelease: false
          files: release-assets/*
